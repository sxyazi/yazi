ratatui-core     = { workspace = true }
ratatui-widgets  = { workspace = true }
serde            = { workspace = true }
thiserror        = { workspace = true }
toml             = { workspace = true }
twox-hash        = { workspace = true }
unicode-width    = { workspace = true }

[dependencies.unicode-segmentation]
version = "1.13.3"
